<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个围绕两个人真实回忆的情侣影像空间，用于展示照片和短视频。"
    />
    <title>我们的影像空间</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>我们的影像空间</h1>
          <p>名字、自拍、晚餐、书城、公园、海边、影石和调香体验里的两个人</p>
        </div>
      </div>

      <div class="toolbar" aria-label="影像空间工具栏">
        <label class="search">
          <span class="visually-hidden">搜索影像</span>
          <input id="searchInput" type="search" placeholder="搜索照片、视频、地点、留言或标签" />
        </label>
      </div>
    </header>

    <main>
      <section class="overview" aria-label="影像空间概览">
        <article class="stat">
          <strong id="totalCount">0</strong>
          <span>个回忆</span>
        </article>
        <article class="stat">
          <strong id="categoryCount">0</strong>
          <span>个分类</span>
        </article>
        <article class="stat">
          <strong id="yearRange">-</strong>
          <span>时间跨度</span>
        </article>
      </section>

      <nav class="filters" aria-label="影像分类">
        <button class="filter is-active" type="button" data-filter="all">全部</button>
        <button class="filter" type="button" data-filter="date">约会</button>
        <button class="filter" type="button" data-filter="travel">旅行</button>
        <button class="filter" type="button" data-filter="daily">日常</button>
        <button class="filter" type="button" data-filter="anniversary">纪念日</button>
        <button class="filter" type="button" data-filter="surprise">惊喜</button>
      </nav>

      <section id="gallery" class="gallery" aria-live="polite"></section>

      <p id="emptyState" class="empty-state" hidden>
        没有匹配的内容。可以换个关键词，或切回全部分类。
      </p>
    </main>

    <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="影像预览">
      <button id="closeLightbox" class="icon-button close-button" type="button" aria-label="关闭预览">
        x
      </button>
      <button id="prevPhoto" class="icon-button nav-button nav-button-left" type="button" aria-label="上一张">
        ‹
      </button>
      <figure class="lightbox-panel">
        <img id="lightboxImage" alt="" />
        <video id="lightboxVideo" controls playsinline hidden></video>
        <figcaption>
          <div>
            <strong id="lightboxTitle"></strong>
            <span id="lightboxMeta"></span>
            <p id="lightboxNote"></p>
          </div>
        </figcaption>
      </figure>
      <button id="nextPhoto" class="icon-button nav-button nav-button-right" type="button" aria-label="下一张">
        ›
      </button>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
